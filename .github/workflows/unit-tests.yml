name: Unit Tests

on: 
  workflow_dispatch:
  workflow_call:
  push:

jobs:
  test:
    name: Unit Tests (${{ matrix.exe }} - ${{ matrix.version }})
    runs-on: windows-latest
    permissions:
      contents: read
      checks: write
      pull-requests: write
    strategy:
      fail-fast: false
      matrix:
        exe: ['AutoHotkey64.exe', 'AutoHotkey32.exe']
        version: ['latest', '2.1-latest']

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install AutoHotkey V2
        uses: holy-tao/install-autohotkey@v2.0.0
        with:
          version: ${{ matrix.version }}

      - name: Run Unit Tests
        working-directory: tests
        shell: powershell
        run: ${{ matrix.exe }} /ErrorStdOut RunTests.ahk

      - name: Publish Test Results
        if: always()
        uses: mikepenz/action-junit-report@v6
        with:
          report_paths: tests/junit.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          check_name: Test Results (${{ matrix.exe }} - ${{ matrix.version }})

  all-tests-passed:
    name: All Tests Passed
    runs-on: ubuntu-latest
    needs: test
    if: always()
    steps:
      - name: Fail if any matrix job failed
        if: needs.test.result != 'success'
        run: exit 1
